<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absorption Matrix Dashboard</title>
<style>
  :root {
    --bg:         #0d1b2a;
    --surface:    #112236;
    --surface2:   #162d45;
    --border:     #1e3a55;
    --accent:     #2e75b6;
    --accent2:    #1a4f82;
    --text:       #e8f0f8;
    --text-dim:   #7a9ab8;
    --text-muted: #4a6a88;
    --repeat-bg:  #2a1f00;
    --repeat-fg:  #ffd966;
    --repeat-bd:  #c8960a;
    --green:      #1a7a3a;
    --red:        #8b1a1a;
    --tag-bg:     #1e3a55;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    min-height: 100vh;
  }

  /* ── HEADER ──────────────────────────────────────────────── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left h1 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: .3px;
  }
  .header-left .subtitle {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .badge {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
  }
  .badge.highlight { background: #2a1f00; border-color: var(--repeat-bd); color: var(--repeat-fg); }

  /* ── CONTROLS ─────────────────────────────────────────────── */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .control-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  /* Date range toggle */
  .date-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .date-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    padding: 5px 12px;
    cursor: pointer;
    font-size: 11px;
    transition: all .15s;
    border-right: 1px solid var(--border);
  }
  .date-btn:last-child { border-right: none; }
  .date-btn:hover { background: var(--surface2); color: var(--text); }
  .date-btn.active { background: var(--accent); color: #fff; }

  /* Product filter pills */
  .product-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .pill {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 10px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 11px;
    transition: all .15s;
  }
  .pill:hover { border-color: var(--accent); color: var(--text); }
  .pill.active { background: var(--accent2); border-color: var(--accent); color: #fff; }

  /* Search */
  .search-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    width: 160px;
    outline: none;
    transition: border-color .15s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-muted); }

  /* ── MAIN CONTENT ─────────────────────────────────────────── */
  .main { padding: 20px 24px; }

  /* ── PRODUCT SECTION ──────────────────────────────────────── */
  .product-section {
    margin-bottom: 28px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .product-section.hidden { display: none; }

  .section-header {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 9px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .section-header:hover { background: var(--surface); }
  .section-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--accent);
  }
  .section-meta {
    font-size: 11px;
    color: var(--text-muted);
  }
  .section-toggle { color: var(--text-dim); font-size: 14px; transition: transform .2s; }
  .section-toggle.collapsed { transform: rotate(-90deg); }

  .section-body { overflow: hidden; }
  .section-body.collapsed { display: none; }

  /* ── TABLE ────────────────────────────────────────────────── */
  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11.5px;
  }

  /* Date group header row */
  .date-group-row th {
    background: var(--accent2);
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 6px 4px;
    text-align: center;
    border-right: 2px solid var(--bg);
    letter-spacing: .3px;
  }
  .date-group-row th.inst-hdr {
    background: var(--surface2);
    border-right: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 10px;
    text-transform: uppercase;
  }
  .date-group-row th.today-col { background: #1a4a2a; }
  .date-group-row th.empty-col { background: var(--surface); color: var(--text-muted); }

  /* Metric sub-header row */
  .metric-row th {
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 9.5px;
    font-weight: 600;
    padding: 4px 4px;
    text-align: center;
    border-right: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: .3px;
  }
  .metric-row th.inst-hdr { border-right: 1px solid var(--border); }
  .metric-row th.last-in-group { border-right: 2px solid var(--bg); }

  /* Data rows */
  tbody tr { transition: background .1s; }
  tbody tr:hover td { background: var(--surface2) !important; }
  tbody tr.hidden-row { display: none; }

  td {
    padding: 5px 6px;
    text-align: center;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    color: var(--text);
    white-space: nowrap;
  }
  td.inst-cell {
    text-align: left;
    font-weight: 600;
    padding-left: 12px;
    border-right: 1px solid var(--border);
    color: var(--text);
    min-width: 130px;
    max-width: 160px;
  }
  td.empty-cell { color: var(--text-muted); }
  td.last-in-group { border-right: 2px solid var(--bg); }
  td.vol-cell { font-weight: 600; }

  /* Alternating rows */
  tbody tr.even td { background: var(--surface); }
  tbody tr.odd  td { background: var(--bg); }

  /* Repeat highlight */
  tbody tr.repeat td {
    background: var(--repeat-bg) !important;
    color: var(--repeat-fg);
    border-color: #3a2a00;
  }
  tbody tr.repeat td.inst-cell {
    color: var(--repeat-fg);
    border-left: 3px solid var(--repeat-bd);
  }
  tbody tr.repeat:hover td { background: #3a2800 !important; }

  /* Vol ratio colour coding */
  .ratio-high { color: #ff9966; }
  .ratio-med  { color: #ffd966; }

  /* ── EMPTY STATE ──────────────────────────────────────────── */
  .empty-state {
    padding: 32px;
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
  }

  /* ── FOOTER ───────────────────────────────────────────────── */
  .footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
  }
</style>
</head>

<div class="header">

  </div>

  <span class="control-label" style="margin-left:8px">Products</span>
  <div class="product-pills" id="product-pills"></div>

  <input class="search-box" id="search" type="text" placeholder="Search contract…">
</div>

<div class="main" id="main">

</div>

<div class="footer">

// ── STATE ─────────────────────────────────────────────────────────────────────
const state = {
  daysWindow:      5,
  activeProducts:  new Set(),   // empty = all visible
  searchQuery:     "",
  collapsed:       new Set(),
};

const PRODUCTS_ORDER = [
  "Wheat","Corn","Soybeans","Soy Meal","Soy Oil","Canola / RS","Palm Oil"
];

const METRICS = [
  { key: "Yesterday Volume",  label: "Vol",    fmt: fmtVol  },
  { key: "10D Avg Vol",       label: "10D Avg",fmt: fmtVol  },
  { key: "Vol Ratio",         label: "Ratio",  fmt: fmtRatio},
  { key: "Yesterday Range",   label: "Range",  fmt: fmtNum  },
  { key: "5D ATR",            label: "ATR",    fmt: fmtNum  },
  { key: "Max Volume Price",  label: "MVP",    fmt: fmtNum  },
];

// ── FORMAT HELPERS ────────────────────────────────────────────────────────────
function fmtVol(v)   { if (v == null) return "—"; return Number(v).toLocaleString(); }
function fmtNum(v)   { if (v == null) return "—"; return Number(v).toFixed(2); }
function fmtRatio(v) { if (v == null) return "—"; return Number(v).toFixed(2); }

function ratioClass(v) {
  if (v == null) return "";
  return v >= 3 ? "ratio-high" : v >= 2 ? "ratio-med" : "";
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render() {
  if (!ABSORPTION_DATA) {
    document.getElementById("main").innerHTML =
      '<div class="empty-state">No data loaded yet. Push an Excel file to absorption-data/ to get started.</div>';
    return;
  }

  const { all_dates, products, records, generated } = ABSORPTION_DATA;

  // Filter dates by window
  const days = state.daysWindow;
  const visibleDates = days === 0 ? all_dates : all_dates.slice(0, days);

  // Update badges
  document.getElementById("subtitle").textContent =
    `Showing ${visibleDates.length} day${visibleDates.length !== 1 ? "s" : ""}  ·  Latest: ${visibleDates[0] || "—"}`;
  document.getElementById("date-badge").textContent =
    `${all_dates.length} dates in history`;
  document.getElementById("footer-right").textContent = `Generated: ${generated}`;

  // Compute repeat instruments within visible window
  const instDayCount = {};
  for (const r of records) {
    if (visibleDates.includes(r.Date)) {
      instDayCount[r.Instrument] = (instDayCount[r.Instrument] || 0) + 1;
    }
  }
  const repeatInsts = new Set(Object.entries(instDayCount)
    .filter(([, c]) => c >= 2).map(([i]) => i));
  document.getElementById("repeat-badge").textContent =
    `● ${repeatInsts.size} repeat contracts`;

  // Group records by product+instrument for quick lookup
  const byProdInst = {};   // prod → inst → date → record
  for (const r of records) {
    if (!visibleDates.includes(r.Date)) continue;
    const prod = r.Product || "Other";
    if (!byProdInst[prod]) byProdInst[prod] = {};
    if (!byProdInst[prod][r.Instrument]) byProdInst[prod][r.Instrument] = {};
    byProdInst[prod][r.Instrument][r.Date] = r;
  }

  // Build product pills (once)
  const pillsEl = document.getElementById("product-pills");
  if (!pillsEl.children.length) {
    for (const p of PRODUCTS_ORDER) {
      const btn = document.createElement("button");
      btn.className = "pill";
      btn.textContent = p;
      btn.dataset.product = p;
      btn.addEventListener("click", () => {
        if (state.activeProducts.has(p)) state.activeProducts.delete(p);
        else state.activeProducts.add(p);
        applyFilters();
        updatePills();
      });
      pillsEl.appendChild(btn);
    }
  }

  // Render sections
  const main = document.getElementById("main");
  main.innerHTML = "";

  const orderedProds = PRODUCTS_ORDER.filter(p => byProdInst[p]);

  for (const prod of orderedProds) {
    const instMap = byProdInst[prod];
    // Sort instruments by volume on the most recent date they appear, desc
    const instList = Object.keys(instMap).sort((a, b) => {
      const latestA = visibleDates.find(d => instMap[a][d]);
      const latestB = visibleDates.find(d => instMap[b][d]);
      const volA = latestA ? (instMap[a][latestA]["Yesterday Volume"] || 0) : 0;
      const volB = latestB ? (instMap[b][latestB]["Yesterday Volume"] || 0) : 0;
      return volB - volA;
    });

    const section = buildSection(prod, instList, instMap, visibleDates, repeatInsts);
    main.appendChild(section);
  }

  if (!orderedProds.length) {
    main.innerHTML = '<div class="empty-state">No data for the selected range.</div>';
  }

  applyFilters();
}

// ── BUILD ONE PRODUCT SECTION ─────────────────────────────────────────────────
function buildSection(prod, instList, instMap, visibleDates, repeatInsts) {
  const section = document.createElement("div");
  section.className = "product-section";
  section.dataset.product = prod;

  const repeatCount = instList.filter(i => repeatInsts.has(i)).length;
  const collapsed   = state.collapsed.has(prod);

  // Header
  const hdr = document.createElement("div");
  hdr.className = "section-header";
  hdr.innerHTML = `
    <span class="section-title">${prod}</span>
    <span class="section-meta">${instList.length} contracts · ${repeatCount} repeating</span>
    <span class="section-toggle ${collapsed ? "collapsed" : ""}">▼</span>
  `;
  hdr.addEventListener("click", () => {
    const body   = section.querySelector(".section-body");
    const toggle = hdr.querySelector(".section-toggle");
    if (state.collapsed.has(prod)) {
      state.collapsed.delete(prod);
      body.classList.remove("collapsed");
      toggle.classList.remove("collapsed");
    } else {
      state.collapsed.add(prod);
      body.classList.add("collapsed");
      toggle.classList.add("collapsed");
    }
  });
  section.appendChild(hdr);

  // Body
  const body = document.createElement("div");
  body.className = "section-body" + (collapsed ? " collapsed" : "");

  const wrap = document.createElement("div");
  wrap.className = "table-wrap";

  const table = document.createElement("table");

  // ── Date group header row ──────────────────────────────────────────────────
  const dateRow = document.createElement("tr");
  dateRow.className = "date-group-row";

  const instTh = document.createElement("th");
  instTh.className = "inst-hdr";
  instTh.textContent = "Contract";
  instTh.rowSpan = 2;
  instTh.style.verticalAlign = "bottom";
  dateRow.appendChild(instTh);

  for (let di = 0; di < visibleDates.length; di++) {
    const d   = visibleDates[di];
    const th  = document.createElement("th");
    th.colSpan = METRICS.length;
    th.textContent = d;
    if (di === 0) th.classList.add("today-col");
    // mark last metric col of each date
    th.style.borderRight = di < visibleDates.length - 1 ? "2px solid var(--bg)" : "";
    dateRow.appendChild(th);
  }
  table.appendChild(dateRow);

  // ── Metric sub-header row ──────────────────────────────────────────────────
  const metricRow = document.createElement("tr");
  metricRow.className = "metric-row";

  for (let di = 0; di < visibleDates.length; di++) {
    for (let mi = 0; mi < METRICS.length; mi++) {
      const th = document.createElement("th");
      th.textContent = METRICS[mi].label;
      if (mi === METRICS.length - 1) th.classList.add("last-in-group");
      metricRow.appendChild(th);
    }
  }
  table.appendChild(metricRow);

  // ── Data rows ──────────────────────────────────────────────────────────────
  const tbody = document.createElement("tbody");
  instList.forEach((inst, ri) => {
    const tr = document.createElement("tr");
    tr.className = repeatInsts.has(inst) ? "repeat" : (ri % 2 === 0 ? "even" : "odd");
    tr.dataset.inst = inst;

    const tdInst = document.createElement("td");
    tdInst.className = "inst-cell";
    tdInst.textContent = inst;
    tr.appendChild(tdInst);

    for (let di = 0; di < visibleDates.length; di++) {
      const d   = visibleDates[di];
      const rec = instMap[inst]?.[d];

      for (let mi = 0; mi < METRICS.length; mi++) {
        const td  = document.createElement("td");
        const m   = METRICS[mi];

        if (!rec) {
          td.textContent = "—";
          td.classList.add("empty-cell");
        } else {
          const val = rec[m.key];
          td.textContent = m.fmt(val);
          if (mi === 0) td.classList.add("vol-cell");
          if (mi === 2 && val != null) td.className += " " + ratioClass(val);
        }

        if (mi === METRICS.length - 1) td.classList.add("last-in-group");
        tr.appendChild(td);
      }
    }

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  wrap.appendChild(table);
  body.appendChild(wrap);
  section.appendChild(body);
  return section;
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function applyFilters() {
  const q = state.searchQuery.toLowerCase();

  document.querySelectorAll(".product-section").forEach(sec => {
    const prod    = sec.dataset.product;
    const prodVis = state.activeProducts.size === 0 || state.activeProducts.has(prod);
    sec.classList.toggle("hidden", !prodVis);
    if (!prodVis) return;

    // Search within rows
    let anyVisible = false;
    sec.querySelectorAll("tbody tr").forEach(tr => {
      const inst = (tr.dataset.inst || "").toLowerCase();
      const show = !q || inst.includes(q);
      tr.classList.toggle("hidden-row", !show);
      if (show) anyVisible = true;
    });

    // Hide entire section if search yields nothing
    if (q && !anyVisible) sec.classList.add("hidden");
  });
}

function updatePills() {
  document.querySelectorAll(".pill").forEach(p => {
    p.classList.toggle("active", state.activeProducts.has(p.dataset.product));
  });
}

// ── EVENT WIRING ──────────────────────────────────────────────────────────────
document.getElementById("date-toggle").addEventListener("click", e => {
  const btn = e.target.closest(".date-btn");
  if (!btn) return;
  document.querySelectorAll(".date-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  state.daysWindow = parseInt(btn.dataset.days);
  render();
});

document.getElementById("search").addEventListener("input", e => {
  state.searchQuery = e.target.value;
  applyFilters();
});

// ── BOOT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
