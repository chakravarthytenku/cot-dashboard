<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Platts Daily Grains & Oilseeds</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d0d0d;color:#f0ece0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
  /* ── LOGIN ── */
  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
  .login-box{background:#141414;border:1px solid #222;border-radius:14px;padding:40px 44px;width:340px;text-align:center}
  .login-box h2{font-size:18px;font-weight:700;margin-bottom:4px}
  .login-box p{font-size:11px;color:#444;margin-bottom:28px}
  .login-box input{width:100%;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:7px;padding:10px 12px;color:#f0ece0;font-size:13px;margin-bottom:12px;outline:none}
  .login-box input:focus{border-color:#444}
  .login-box button{width:100%;background:#c8a96e;border:none;border-radius:7px;padding:11px;color:#0d0d0d;font-weight:700;font-size:13px;cursor:pointer;margin-top:4px}
  .login-box button:hover{background:#d4b87a}
  .login-error{color:#e07a5f;font-size:11px;margin-top:8px;min-height:16px}
  /* ── APP ── */
  #app{display:none}
  /* ── HEADER ── */
  .header{border-bottom:1px solid #1a1a1a;padding:18px 24px 12px}
  .header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
  .header-eyebrow{font-size:9px;color:#333;letter-spacing:.18em;text-transform:uppercase;margin-bottom:5px}
  .header-title{font-size:20px;font-weight:700}
  .header-meta{text-align:right;font-size:9px;color:#2a2a2a;line-height:1.7}
  .header-meta .latest{font-size:13px;font-weight:600;color:#999}
  .header-nav{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
  .tab-btn{padding:5px 13px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500;transition:all .12s;background:#181818;color:#666}
  .tab-btn.active{color:#0d0d0d}
  .view-btn{padding:5px 11px;border-radius:6px;border:1px solid #222;cursor:pointer;font-size:11px;background:transparent;color:#444}
  .view-btn.active{background:#1e1e1e;color:#bbb}
  .nav-spacer{flex:1}
  .nav-link{padding:5px 11px;border-radius:6px;border:1px solid #2a2a2a;cursor:pointer;font-size:11px;background:transparent;color:#555;text-decoration:none}
  .nav-link:hover{color:#888;border-color:#444}
  .logout-btn{padding:5px 11px;border-radius:6px;border:1px solid #222;cursor:pointer;font-size:11px;background:transparent;color:#444}
  .logout-btn:hover{color:#e07a5f;border-color:#e07a5f44}
  /* ── CONTENT ── */
  .content{padding:18px 24px}
  .section-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .section-bar{width:3px;height:16px;border-radius:2px}
  .section-label{font-size:14px;font-weight:600}
  .section-meta{font-size:11px;color:#333}
  /* ── KPI GRID ── */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
  .kpi-card{background:#141414;border:1px solid #222;border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;gap:6px}
  .kpi-sym{font-size:9px;color:#3a3a3a;font-family:monospace}
  .kpi-unit-badge{font-size:9px;color:#2e2e2e;background:#1c1c1c;padding:2px 5px;border-radius:3px}
  .kpi-label{font-size:12px;color:#666;line-height:1.3}
  .kpi-value{font-size:20px;font-weight:700;font-family:monospace;color:#f0ece0}
  .kpi-value.null{color:#333}
  .kpi-footer{display:flex;align-items:center;gap:6px}
  .badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px}
  .badge.up{background:rgba(124,185,142,.18);color:#4caf7d}
  .badge.down{background:rgba(224,122,95,.18);color:#e07a5f}
  .badge.flat{background:rgba(255,255,255,.04);color:#555}
  .badge.na{color:#444}
  .kpi-pct{font-size:10px}
  .kpi-spark{margin-top:2px}
  /* ── CHART GRID ── */
  .chart-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
  .chart-card{background:#141414;border:1px solid #222;border-radius:10px;padding:14px 16px 10px}
  .chart-header{display:flex;justify-content:space-between;margin-bottom:10px}
  .chart-title{font-size:11px;color:#888}
  .chart-sym{font-size:9px;color:#3a3a3a;font-family:monospace;margin-right:4px}
  .chart-unit{font-size:9px;color:#333}
  .chart-wrap{position:relative;height:130px}
  /* ── TABLE ── */
  .table-section{margin-top:28px;border-top:1px solid #1a1a1a;padding-top:20px}
  .table-eyebrow{font-size:9px;color:#2a2a2a;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
  .table-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:11px}
  th{text-align:right;padding:5px 10px;color:#3a3a3a;font-weight:500;white-space:nowrap}
  th:first-child,th:nth-child(2){text-align:left}
  th:nth-child(3){text-align:center}
  td{padding:6px 10px;font-family:monospace;text-align:right;white-space:nowrap}
  td:first-child{text-align:left;font-size:9px;color:#3a3a3a}
  td:nth-child(2){text-align:left;font-family:inherit;color:#666;font-size:11px}
  td:nth-child(3){text-align:center;font-size:9px;color:#2e2e2e}
  tr{border-bottom:1px solid #141414}
  tr:nth-child(even){background:#0f0f0f}
  .val-null{color:#282828}
  .val-latest-up{color:#4caf7d;font-weight:600}
  .val-latest-down{color:#e07a5f;font-weight:600}
  .val-latest-flat{color:#ccc;font-weight:600}
  .val-old{color:#444}
  @media(max-width:600px){
    .header-top{flex-direction:column;gap:8px}
    .header-meta{text-align:left}
    .kpi-grid{grid-template-columns:1fr 1fr}
    .chart-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div style="font-size:9px;color:#3a3a3a;letter-spacing:.18em;text-transform:uppercase;margin-bottom:10px">S&P Global Platts</div>
    <h2>Grains & Oilseeds</h2>
    <p>Price Dashboard</p>
    <input id="u" type="text" placeholder="Username" autocomplete="username"/>
    <input id="p" type="password" placeholder="Password" autocomplete="current-password"/>
    <button onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-err"></div>
  </div>
</div>

<!-- ══════════════ APP ══════════════ -->
<div id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-eyebrow">S&P Global Platts · Daily Grains &amp; Oilseeds</div>
        <div class="header-title">Price Dashboard</div>
      </div>
      <div class="header-meta">
        <div>LATEST</div>
        <div class="latest" id="hd-latest"></div>
        <div id="hd-prev"></div>
        <div id="hd-count"></div>
      </div>
    </div>
    <div class="header-nav" id="tab-nav"></div>
  </div>
  <div class="content" id="content"></div>
</div>

// ═══════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════
const USERS = { 'trader': 'cot2026', 'admin': 'admin123' };

function doLogin() {
  const u = document.getElementById('u').value.trim();
  const p = document.getElementById('p').value;
  if (USERS[u] && USERS[u] === p) {
    sessionStorage.setItem('platts_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    document.getElementById('login-err').textContent = 'Invalid credentials.';
  }
}
document.getElementById('p').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
if (sessionStorage.getItem('platts_auth')) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

// HELPERS
// ═══════════════════════════════════════════════════════
const fmt = v => (v === null || v === undefined) ? '—'
  : v.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});

function fillForward(sym) {
  let last = null;
  return DATA.map(r => {
    const v = r[sym];
    if (v !== null && v !== undefined) last = v;
    return { date: r.date, v: last };
  });
}

function getLatestTwo(sym) {
  const vals = DATA.map(d => d[sym]).filter(v => v !== null && v !== undefined);
  if (vals.length < 2) return [vals[vals.length-1] ?? null, null];
  return [vals[vals.length-1], vals[vals.length-2]];
}

function delta(sym) {
  const [a, b] = getLatestTwo(sym);
  return (a !== null && b !== null) ? a - b : null;
}

function pct(sym) {
  const [a, b] = getLatestTwo(sym);
  if (a === null || b === null || b === 0) return null;
  return ((a - b) / Math.abs(b)) * 100;
}

function badgeHTML(d) {
  if (d === null) return `<span class="badge na">—</span>`;
  if (d === 0)    return `<span class="badge flat">—</span>`;
  if (d > 0)      return `<span class="badge up">▲ ${Math.abs(d).toFixed(2)}</span>`;
  return              `<span class="badge down">▼ ${Math.abs(d).toFixed(2)}</span>`;
}

// ═══════════════════════════════════════════════════════
// CHART REGISTRY  (destroy before redraw)
// ═══════════════════════════════════════════════════════
const _charts = {};
function destroyChart(id) { if (_charts[id]) { _charts[id].destroy(); delete _charts[id]; } }
function destroyAll() { Object.keys(_charts).forEach(destroyChart); }

function makeChart(canvasId, labels, values, color, isSmall) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  const min = Math.min(...values), max = Math.max(...values), pad = (max-min)*0.15||1;
  _charts[canvasId] = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: values,
        borderColor: color,
        borderWidth: isSmall ? 1.5 : 2,
        pointBackgroundColor: isSmall ? 'transparent' : color,
        pointRadius: isSmall ? 0 : 3,
        pointHoverRadius: isSmall ? 0 : 4,
        tension: 0.3,
        fill: false,
      }]
    },
    options: {
      animation: false,
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: isSmall ? { enabled: false } : {
          backgroundColor: '#1a1a1a',
          borderColor: '#333',
          borderWidth: 1,
          titleColor: '#888',
          bodyColor: color,
          callbacks: { label: ctx => fmt(ctx.parsed.y) }
        }
      },
      scales: {
        x: isSmall ? { display: false } : {
          ticks: { color:'#444', font:{size:10} },
          grid: { color:'#1a1a1a' },
          border: { display:false }
        },
        y: {
          display: !isSmall,
          min: min - pad,
          max: max + pad,
          ticks: { color:'#444', font:{size:10}, maxTicksLimit:5,
            callback: v => v.toLocaleString('en-US',{maximumFractionDigits:1}) },
          grid: { color:'#1a1a1a' },
          border: { display:false }
        }
      }
    }
  });
}

let activeTab = 'wheat';

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function init() {
  const last = DATA[DATA.length-1];
  const prev = DATA[DATA.length-2];
  document.getElementById('hd-latest').textContent = last.date;
  document.getElementById('hd-prev').textContent = 'prev: ' + (prev ? prev.date : '—');
  document.getElementById('hd-count').textContent = DATA.length + ' days loaded';
  renderNav();
  renderContent();
}

function renderNav() {
  const nav = document.getElementById('tab-nav');
  nav.innerHTML = TABS.map(t => `
    <button class="tab-btn${t.id===activeTab?' active':''}"
      style="${t.id===activeTab?`background:${t.color}`:''}; "
      onclick="switchTab('${t.id}')">${t.label}</button>
  `).join('') +
  `<div class="nav-spacer"></div>
   <button class="view-btn${activeView==='cards'?' active':''}" onclick="switchView('cards')">KPI Cards</button>
   <button class="view-btn${activeView==='charts'?' active':''}" onclick="switchView('charts')">Trend Charts</button>
   <a href="index.html" class="nav-link">← COT Dashboard</a>
   <button class="logout-btn" onclick="logout()">Sign out</button>`;
}

function switchTab(id) { activeTab=id; destroyAll(); renderNav(); renderContent(); }
function switchView(v) { activeView=v; destroyAll(); renderNav(); renderContent(); }
function logout() { sessionStorage.removeItem('platts_auth'); location.reload(); }

function renderContent() {
  const tab = TABS.find(t => t.id === activeTab);
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="section-header">
      <div class="section-bar" style="background:${tab.color}"></div>
      <span class="section-label" style="color:${tab.color}">${tab.label}</span>
      <span class="section-meta">· ${tab.metrics.length} metrics · ${DATA.length} days</span>
    </div>
    <div id="main-view"></div>
    ${renderTable(tab)}
  `;

  if (activeView === 'cards') renderCards(tab);
  else renderCharts(tab);
}

function renderCards(tab) {
  const view = document.getElementById('main-view');
  view.className = 'kpi-grid';
  view.innerHTML = tab.metrics.map((m, mi) => {
    const latest = DATA[DATA.length-1][m.sym];
    const d = delta(m.sym);
    const p = pct(m.sym);
    const pColor = p === null ? '#3a3a3a' : p > 0 ? '#4caf7d' : p < 0 ? '#e07a5f' : '#555';
    const pStr = p === null ? '' : `<span class="kpi-pct" style="color:${pColor}">${p>0?'+':''}${p.toFixed(2)}%</span>`;
    return `
      <div class="kpi-card">
        <div style="display:flex;justify-content:space-between">
          <span class="kpi-sym">${m.sym}</span>
          <span class="kpi-unit-badge">${m.unit}</span>
        </div>
        <div class="kpi-label">${m.label}</div>
        <div class="kpi-value${latest===null?' null':''}">${latest===null?'N/A':fmt(latest)}</div>
        <div class="kpi-footer">${badgeHTML(d)} ${pStr}</div>
        <div class="kpi-spark"><canvas id="spark-${mi}-${m.sym}" height="36"></canvas></div>
      </div>`;
  }).join('');

  // draw sparklines after DOM is ready
  requestAnimationFrame(() => {
    tab.metrics.forEach((m, mi) => {
      const cd = fillForward(m.sym).filter(r => r.v !== null);
      if (cd.length < 2) return;
      makeChart(`spark-${mi}-${m.sym}`, cd.map(r=>r.date), cd.map(r=>r.v), tab.color, true);
    });
  });
}

function renderCharts(tab) {
  const view = document.getElementById('main-view');
  view.className = 'chart-grid';
  view.innerHTML = tab.metrics.map((m, mi) => {
    const cd = fillForward(m.sym).filter(r => r.v !== null);
    if (!cd.length) return '';
    return `
      <div class="chart-card">
        <div class="chart-header">
          <span class="chart-title"><span class="chart-sym">${m.sym}</span>${m.label}</span>
          <span class="chart-unit">${m.unit}</span>
        </div>
        <div class="chart-wrap"><canvas id="chart-${mi}-${m.sym}"></canvas></div>
      </div>`;
  }).join('');

  requestAnimationFrame(() => {
    tab.metrics.forEach((m, mi) => {
      const cd = fillForward(m.sym).filter(r => r.v !== null);
      if (cd.length < 2) return;
      makeChart(`chart-${mi}-${m.sym}`, cd.map(r=>r.date), cd.map(r=>r.v), tab.color, false);
    });
  });
}

function renderTable(tab) {
  const last = DATA.length - 1;
  const headers = DATA.map(d => `<th>${d.date}</th>`).join('');
  const rows = tab.metrics.map((m, i) => {
    const d = delta(m.sym), p = pct(m.sym);
    const isUp = d !== null && d > 0, isDown = d !== null && d < 0;
    const cells = DATA.map((row, ri) => {
      const v = row[m.sym];
      let cls = 'val-old';
      if (v === null) cls = 'val-null';
      else if (ri === last) cls = isUp ? 'val-latest-up' : isDown ? 'val-latest-down' : 'val-latest-flat';
      return `<td class="${cls}">${v === null ? '—' : fmt(v)}</td>`;
    }).join('');
    const pColor = p===null?'#333':p>0?'#4caf7d':p<0?'#e07a5f':'#555';
    const pStr = p===null?'—':`<span style="color:${pColor}">${p>0?'+':''}${p.toFixed(2)}%</span>`;
    return `<tr>
      <td>${m.sym}</td>
      <td>${m.label}</td>
      <td style="text-align:center;font-size:9px;color:#2e2e2e">${m.unit}</td>
      ${cells}
      <td>${badgeHTML(d)}</td>
      <td style="font-size:10px">${pStr}</td>
    </tr>`;
  }).join('');

  return `
    <div class="table-section">
      <div class="table-eyebrow">Raw Data Table</div>
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th style="text-align:left;width:96px">Symbol</th>
            <th style="text-align:left">Description</th>
            <th style="text-align:center;width:50px">Unit</th>
            ${headers}
            <th style="width:80px">Δ</th>
            <th style="width:60px">%</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}
