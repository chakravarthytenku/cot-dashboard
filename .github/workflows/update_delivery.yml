name: Update Delivery Dashboard

on:
  push:
    paths:
      - 'delivery-data/**'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install xlrd

      - name: Run extraction
        run: python scripts/extract_delivery.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add delivery.html delivery-history.json
          git diff --cached --quiet || git commit -m "chore: update delivery dashboard [skip ci]"
          git push
