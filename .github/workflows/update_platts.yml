name: Update Platts Dashboard

on:
  push:
    paths:
      - 'platts-data/*.pdf'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pdfplumber

      - name: Run extraction script
        run: python scripts/extract_platts.py

      - name: Commit updated platts.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add platts.html
          git diff --cached --quiet || git commit -m "Auto-update Platts dashboard [skip ci]"
          git push
