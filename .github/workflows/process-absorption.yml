name: Process Absorption Matrix

on:
  push:
    paths:
      - 'absorption-data/**.xlsx'

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Run processor
        run: python scripts/process_absorption.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add absorption.html absorption-history.json
          git diff --cached --quiet || git commit -m "auto: absorption update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
